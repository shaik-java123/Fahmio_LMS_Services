spring.application.name=lms-backend

# Server Configuration for Docker
server.port=8080
server.servlet.context-path=/api

# Docker MySQL Database Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/lms_db
spring.datasource.username=lmsuser
spring.datasource.password=lmspass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your-default-jwt-secret}
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://frontend:3000

# Azure Blob Storage (optional for Docker)
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=lms-files

# Logging Configuration
logging.level.root=INFO
logging.level.com.lms=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics

