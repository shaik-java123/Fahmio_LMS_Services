# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS Configuration
# Add your actual Azure frontend URL here. Wildcards supported via allowedOriginPatterns.
cors.allowed-origins=https://lms-frontend-app.azurewebsites.net,https://*.azurewebsites.net,https://www.yourdomain.com,https://yourdomain.com

# App URLs
app.frontend-url=${FRONTEND_URL:https://lms-frontend-app.azurewebsites.net}

# Logging Configuration
logging.level.root=WARN
logging.level.com.lms=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Actuator (for health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Startup Optimization
spring.devtools.restart.enabled=false
spring.jmx.enabled=false
spring.main.lazy-initialization=false

