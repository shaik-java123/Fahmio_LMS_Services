spring.application.name=lms-backend

# Server Configuration for Azure
server.port=8080
# NOTE: Do NOT set server.servlet.context-path here.
# The backend already uses /api prefixes on all @RequestMapping annotations.
# Setting context-path=/api would cause double prefix: /api/api/auth/login
server.shutdown=graceful
server.servlet.session.timeout=30m
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# Azure MySQL Flexible Server Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://fahmio-mysql-db.mysql.database.azure.com:3306/flexibleserverdb?useSSL=true&requireSSL=true&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL&allowPublicKeyRetrieval=true&serverSslMode=REQUIRED&enabledSslProtocolSuites=TLSv1.2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fahmioadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:moin@786}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool - Optimized for Azure
# CRITICAL: Set autocommit=false so Hibernate can manage transactions explicitly
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.auto-commit=false

# JPA Configuration - Optimized for Startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.defer-datasource-initialization=true

# Flyway Configuration
# repair-on-migrate: auto-fixes checksum mismatches from previously-edited migrations
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Hibernate Transaction & Connection Provider Settings
# Ensure Hibernate manages transaction commits explicitly
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Hibernate Pool Settings for Azure MySQL
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
#spring.jpa.properties.hibernate.jdbc.time_zone=UTC

